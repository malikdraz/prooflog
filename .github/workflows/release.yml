name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Validate and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy rustfmt

      - name: Validate tag version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/release.sh verify-tag "$GITHUB_REF_NAME"

      - name: Prepare git refs for integration tests
        run: |
          set -eu
          git fetch origin main:refs/remotes/origin/main
          git branch --force main origin/main

      - name: Extract changelog notes
        run: |
          scripts/release.sh extract-notes "$GITHUB_REF_NAME" release-notes.md

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release

      - name: Ensure release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists." >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          scripts/release.sh publish-tap "$GITHUB_REF_NAME"
